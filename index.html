<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>GDD</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0a0a0b; color:#e5e5e5; font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
         -webkit-font-smoothing:antialiased; padding:24px 18px; }
  .wrap { max-width:820px; margin:0 auto; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; justify-content:space-between; align-items:flex-start;
           border-bottom:1px solid #262626; padding-bottom:16px; margin-bottom:18px; }
  h1 { font-family:ui-monospace,monospace; font-size:18px; font-weight:600; letter-spacing:-.3px; color:#fafafa;
       display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#fbbf24; }
  .sub { font-size:12px; color:#737373; margin-top:4px; }
  .hbtn { background:none; border:none; color:#737373; font-size:11px; cursor:pointer; display:block; text-align:right; }
  .hbtn:hover { color:#fbbf24; }
  .next { font-family:ui-monospace,monospace; font-size:12px; color:#fcd34d; }
  .label { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:#a3a3a3; }
  section { margin-bottom:20px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .stat { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px; padding:12px; }
  .stat .v { font-family:ui-monospace,monospace; font-size:20px; font-weight:700; color:#fafafa; }
  .stat .k { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; margin-top:2px; }
  .prices { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .price { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px; padding:10px 6px; text-align:center; }
  .price .pk { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  .price .pv { font-family:ui-monospace,monospace; font-size:14px; font-weight:600; color:#fcd34d; margin-top:3px; }
  .charts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .card { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:12px; padding:14px; }
  .card h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#a3a3a3; margin-bottom:10px; font-weight:600; }
  .card .now { font-family:ui-monospace,monospace; font-size:13px; color:#e5e5e5; }
  svg { display:block; width:100%; height:auto; overflow:visible; }
  .panel { border:1px solid #262626; background:rgba(23,23,23,.5); border-radius:12px; padding:16px; }
  .row { display:flex; flex-wrap:wrap; gap:12px 16px; align-items:center; }
  .ctl { display:flex; flex-direction:column; gap:4px; }
  .ctl span { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  input[type=number],textarea,input[type=password]{ background:#0a0a0b; border:1px solid #2a2a2a; color:#e5e5e5;
     border-radius:8px; padding:7px 9px; font-family:ui-monospace,monospace; font-size:13px; }
  input[type=number]{ width:90px; }
  textarea{ width:100%; min-height:120px; resize:vertical; line-height:1.5; }
  input[type=range]{ accent-color:#f59e0b; }
  .chip { background:none; border:none; color:#a3a3a3; font-size:12px; padding:4px 8px; border-radius:6px; cursor:pointer; }
  .chip.on { background:rgba(245,158,11,.18); color:#fcd34d; }
  .toggle { display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#a3a3a3; }
  .btn { background:#fbbf24; color:#0a0a0b; border:none; border-radius:8px; padding:8px 14px; font-size:13px;
         font-weight:600; cursor:pointer; }
  .btn.ghost { background:none; color:#a3a3a3; border:1px solid #333; }
  .btn:hover { filter:brightness(1.05); }
  .note { font-size:11px; color:#737373; line-height:1.5; }
  .warn { font-size:11px; color:#fbbf24; line-height:1.5; }
  .traps { font-size:11px; color:#737373; margin-bottom:12px; display:flex; gap:6px; align-items:center; }
  .deal { display:flex; gap:14px; align-items:center; border:1px solid #262626; background:rgba(23,23,23,.4);
          border-radius:10px; padding:12px 16px; margin-bottom:8px; text-decoration:none; color:inherit; transition:.15s; }
  .deal.trap { border-color:#5b2a2a; opacity:.75; }
  .deal:hover { border-color:#404040; background:#171717; }
  .score { width:54px; height:54px; flex-shrink:0; border-radius:10px; background:#0a0a0b;
           display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score .n { font-family:ui-monospace,monospace; font-size:17px; font-weight:700; }
  .score .l { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  .title { font-size:14px; color:#e5e5e5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta { display:flex; flex-wrap:wrap; gap:2px 10px; font-family:ui-monospace,monospace; font-size:11px; color:#737373; margin-top:4px; }
  .grn { color:#34d399; } .red { color:#fb7185; } .wht { color:#d4d4d4; } .amb { color:#fbbf24; }
  .tag { font-size:9px; padding:1px 5px; border-radius:4px; background:rgba(245,158,11,.15); color:#fcd34d; text-transform:uppercase; letter-spacing:.5px; }
  .tag.t { background:rgba(244,63,94,.15); color:#fb7185; }
  .empty { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px;
           padding:24px; text-align:center; font-size:14px; color:#737373; }
  .foot { font-size:11px; line-height:1.6; color:#525252; margin-top:18px; }
  .head-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .hidden { display:none; }
  @media (max-width:640px){ .charts{grid-template-columns:1fr} .stats{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>
<div class="wrap" id="app">Loading…</div>

<script>
const KARATS = ["10K","14K","18K","22K","24K"];
const fmt = n => isFinite(n) ? n.toLocaleString("en-US",{style:"currency",currency:"USD"}) : "—";
const fmtK = n => isFinite(n) ? "$"+(n>=1000 ? (n/1000).toFixed(1)+"k" : n.toFixed(0)) : "—";

const SAMPLE = {
  updated:new Date().toISOString(), spot_per_oz:4118.9, _sample:true,
  prices_per_gram:{ "10K":55.06,"14K":77.13,"18K":99.23,"22K":121.27,"24K":132.29 },
  payout_pct:1.00, traps_count:2, total_profit:1521,
  settings_used:{queries:["14k gold scrap grams","10k gold scrap grams"]},
  deals:[
    {score:84,under_pct:42.1,karat:"14K",grams:31.4,price:1390,ship:0,all_in_per_g:44.27,page_per_g:77.13,profit:1032,offer:true,seller_pct:99.6,title:"14K Solid Gold Rope Chain Scrap Lot 31.4 grams",url:"#"},
    {score:72,under_pct:36.0,karat:"10K",grams:25.0,price:880,ship:8,all_in_per_g:35.52,page_per_g:55.06,profit:489,offer:false,seller_pct:98.1,title:"585 Gold Scrap 25 grams broken chains",url:"#"},
  ],
  traps:[{score:100,under_pct:74,karat:"24K",grams:1,price:30,ship:4,all_in_per_g:34,page_per_g:132,profit:98,offer:false,seller_pct:90,title:"24K Gold Bar 1g (too good to be true)",url:"#",trap:true}]
};
const SAMPLE_HIST = Array.from({length:24},(_,i)=>({
  t:new Date(Date.now()-(23-i)*1800000).toISOString(),
  spot_oz:4060+Math.round(Math.sin(i/3)*40+i*2),
  deals:3+Math.round(Math.abs(Math.sin(i/2))*6),
  avg_under:24+Math.round(Math.abs(Math.cos(i/2))*10)
}));

let DATA=null, HIST=[], SET=null;
const ui = loadUI();
function loadUI(){ try{return JSON.parse(localStorage.getItem("gdd_ui"))||{}}catch(e){return {}} }
function saveUI(){ try{localStorage.setItem("gdd_ui",JSON.stringify(ui))}catch(e){} }
const F = Object.assign({karat:"All",minScore:0,minProfit:0,showTraps:false,settingsOpen:false}, ui.F||{});

function scoreStyle(s){
  if(s>=75) return {c:"#34d399",l:"Excellent"};
  if(s>=50) return {c:"#a3e635",l:"Strong"};
  if(s>=25) return {c:"#fbbf24",l:"Fair"};
  return {c:"#a3a3a3",l:"Slim"};
}
function lineChart(vals,color){
  if(!vals.length) return '<div class="now" style="color:#525252">no history yet</div>';
  const W=300,H=70,p=4,min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const pts=vals.map((v,i)=>[p+(i/(vals.length-1||1))*(W-2*p), p+(1-(v-min)/span)*(H-2*p)]);
  const d=pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
  const a=d+` L ${pts[pts.length-1][0].toFixed(1)} ${H-p} L ${pts[0][0].toFixed(1)} ${H-p} Z`, L=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${a}" fill="${color}" opacity="0.1"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${L[0].toFixed(1)}" cy="${L[1].toFixed(1)}" r="3" fill="${color}"/></svg>`;
}
function barChart(counts){
  const W=300,H=70,n=KARATS.length,g=10,bw=(W-g*(n+1))/n,max=Math.max(1,...KARATS.map(k=>counts[k]||0));
  return `<svg viewBox="0 0 ${W} ${H}">`+KARATS.map((k,i)=>{
    const v=counts[k]||0,h=(v/max)*(H-22),x=g+i*(bw+g),y=H-18-h;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h,1)}" rx="2" fill="#fbbf24" opacity="${v?0.85:0.2}"/>
      <text x="${x+bw/2}" y="${H-6}" fill="#737373" font-size="9" text-anchor="middle" font-family="monospace">${k}</text>
      <text x="${x+bw/2}" y="${y-3}" fill="#a3a3a3" font-size="9" text-anchor="middle" font-family="monospace">${v||""}</text>`;
  }).join("")+`</svg>`;
}

// next full run: cron */30 within 13-23 UTC
function nextRun(){
  const now=new Date(), u=new Date(now);
  for(let i=0;i<=60*48;i++){
    u.setTime(now.getTime()+i*60000); u.setUTCSeconds(0,0);
    const h=u.getUTCHours(),m=u.getUTCMinutes();
    if((m===0||m===30)&&h>=13&&h<=23&&u>now) return u;
  }
  return null;
}
function countdownStr(){
  const t=nextRun(); if(!t) return "—";
  let s=Math.max(0,Math.round((t-new Date())/1000));
  const m=Math.floor(s/60); s=s%60;
  return `${m}m ${String(s).padStart(2,"0")}s`;
}

async function load(){
  try{ const r=await fetch("results.json",{cache:"no-store"}); if(!r.ok) throw 0; DATA=await r.json(); }
  catch(e){ DATA=SAMPLE; }
  try{ const h=await fetch("history.json",{cache:"no-store"}); HIST=h.ok?await h.json():(DATA._sample?SAMPLE_HIST:[]); }
  catch(e){ HIST=DATA._sample?SAMPLE_HIST:[]; }
  try{ const s=await fetch("settings.json",{cache:"no-store"}); SET=s.ok?await s.json():null; }
  catch(e){ SET=null; }
  if(!SET) SET={payout_pct:DATA.payout_pct||1,trap_under_pct:0.5,max_price:2000,min_feedback_pct:96,alert_min_score:70,extra_exclude:[],queries:(DATA.settings_used&&DATA.settings_used.queries)||[]};
  render();
}

function render(){
  const d=DATA, app=document.getElementById("app");
  const base=d.deals.slice();
  const trapList=(d.traps||[]).map(t=>Object.assign({trap:true},t));
  const pool = F.showTraps ? base.concat(trapList) : base;
  const deals=pool
    .filter(x=>F.karat==="All"||x.karat===F.karat)
    .filter(x=>x.score>=F.minScore)
    .filter(x=>(x.profit||0)>=F.minProfit)
    .sort((a,b)=>b.score-a.score);
  const byKarat={}; d.deals.forEach(x=>byKarat[x.karat]=(byKarat[x.karat]||0)+1);
  const totalProfit=d.total_profit!=null?d.total_profit:d.deals.reduce((s,x)=>s+(x.profit>0?x.profit:0),0);
  const bestScore=d.deals.reduce((m,x)=>Math.max(m,x.score),0);
  const avgUnder=d.deals.length?(d.deals.reduce((s,x)=>s+x.under_pct,0)/d.deals.length).toFixed(0):0;

  app.innerHTML=`
    <header>
      <div><h1><span class="dot"></span>GOLD DEAL DESK</h1>
        <div class="sub">Solid US gold · your filters · under today's price</div></div>
      <div><button class="hbtn" onclick="load()">↻ refresh</button>
        <div class="next">next run in <span id="cd">${countdownStr()}</span></div></div>
    </header>

    <section><div class="stats">
      <div class="stat"><div class="v grn">${d.deals.length}</div><div class="k">live deals</div></div>
      <div class="stat"><div class="v">${bestScore}</div><div class="k">top score</div></div>
      <div class="stat"><div class="v amb">${fmtK(totalProfit)}</div><div class="k">total est. profit</div></div>
      <div class="stat"><div class="v">${avgUnder}%</div><div class="k">avg under price</div></div>
    </div></section>

    <section>
      <div class="head-row"><div class="label">Trends · last ${HIST.length||0} runs</div></div>
      <div class="charts">
        <div class="card"><h3>Gold price ($/oz)</h3>${lineChart(HIST.map(h=>h.spot_oz).filter(Number.isFinite),"#fcd34d")}<div class="now">${fmt(d.spot_per_oz)}/oz</div></div>
        <div class="card"><h3>Deals per run</h3>${lineChart(HIST.map(h=>h.deals).filter(Number.isFinite),"#34d399")}<div class="now">${d.deals.length} now</div></div>
        <div class="card"><h3>Avg discount</h3>${lineChart(HIST.map(h=>h.avg_under).filter(Number.isFinite),"#60a5fa")}<div class="now">${avgUnder}% now</div></div>
        <div class="card"><h3>Live deals by karat</h3>${barChart(byKarat)}<div class="now">${d.deals.length} total</div></div>
      </div>
    </section>

    <section><div class="head-row"><div class="label">Today's gold price per gram</div>
      <div class="mono" style="font-size:11px;color:#737373">${new Date(d.updated).toLocaleString()}</div></div>
      <div class="prices">${KARATS.map(k=>`<div class="price"><div class="pk">${k}</div><div class="pv">${fmt(d.prices_per_gram[k])}</div></div>`).join("")}</div></section>

    <!-- INSTANT LEVERS -->
    <section class="panel"><div class="row" style="margin-bottom:10px">
      <div class="ctl" style="flex:1;min-width:200px"><span>Min score ${F.minScore}</span>
        <input type="range" min="0" max="100" value="${F.minScore}" oninput="setF('minScore',+this.value)"></div>
      <div class="ctl"><span>Min profit $</span>
        <input type="number" min="0" step="10" value="${F.minProfit}" oninput="setF('minProfit',+this.value||0)"></div>
      <label class="toggle"><input type="checkbox" ${F.showTraps?"checked":""} onchange="setF('showTraps',this.checked)"> show likely traps</label>
    </div>
    <div class="row"><span class="label">Karat</span>
      ${["All",...KARATS].map(k=>`<button class="chip ${F.karat===k?"on":""}" onclick="setF('karat','${k}')">${k}</button>`).join("")}
      <button class="btn ghost" style="margin-left:auto" onclick="setF('settingsOpen',!F.settingsOpen)">${F.settingsOpen?"▲ engine settings":"▼ engine settings"}</button>
    </div></section>

    <!-- ENGINE SETTINGS (drive the next run) -->
    <section class="panel ${F.settingsOpen?"":"hidden"}" id="settings">
      <div class="label" style="margin-bottom:10px">Engine settings · these change what the NEXT run does</div>
      <div class="row" style="margin-bottom:12px">
        <div class="ctl"><span>Buyer payout %</span><input id="s_payout" type="number" step="1" value="${Math.round((SET.payout_pct||1)*100)}"></div>
        <div class="ctl"><span>Trap threshold %</span><input id="s_trap" type="number" step="1" value="${Math.round((SET.trap_under_pct||.5)*100)}"></div>
        <div class="ctl"><span>Max price $</span><input id="s_maxprice" type="number" step="50" value="${SET.max_price||2000}"></div>
        <div class="ctl"><span>Min seller %</span><input id="s_seller" type="number" step="1" value="${SET.min_feedback_pct||96}"></div>
        <div class="ctl"><span>Alert at score</span><input id="s_alert" type="number" step="1" value="${SET.alert_min_score||70}"></div>
      </div>
      <div class="ctl" style="margin-bottom:12px"><span>Search terms — one per line</span>
        <textarea id="s_queries">${(SET.queries||[]).join("\n")}</textarea></div>
      <div class="ctl" style="margin-bottom:12px"><span>Extra words to always exclude — comma separated (e.g. watch, locket)</span>
        <textarea id="s_exclude" style="min-height:50px">${(SET.extra_exclude||[]).join(", ")}</textarea></div>

      <div class="row" style="margin-bottom:8px">
        <button class="btn" onclick="saveSettings()">Save</button>
        <button class="btn ghost" onclick="copySettings()">Copy JSON</button>
        <span id="savemsg" class="note"></span>
      </div>
      <details>
        <summary class="note" style="cursor:pointer">One-tap auto-save setup (optional, uses a GitHub token)</summary>
        <div style="margin-top:8px">
          <div class="ctl" style="margin-bottom:6px"><span>Fine-grained GitHub token (contents: read/write, this repo only)</span>
            <input id="s_token" type="password" placeholder="github_pat_..." value="${localStorage.getItem('gdd_token')||''}"></div>
          <button class="btn ghost" onclick="saveToken()">Remember token on this device</button>
          <p class="warn" style="margin-top:8px">This is a write key. Treat it like a password. Scope it to ONLY this repo's contents, it is stored only in this browser, and you can revoke it anytime at github.com/settings/tokens. Without a token, use Copy JSON and paste it into settings.json in your repo, that is just as effective and has no key.</p>
        </div>
      </details>
    </section>

    ${d._sample?`<div class="empty" style="margin-bottom:12px;border-color:rgba(180,120,10,.4);color:#fcd34d;font-size:11px;padding:10px">Showing sample data until the scout writes results.json.</div>`:""}
    ${d.traps_count>0&&!F.showTraps?`<div class="traps">⚠ ${d.traps_count} likely trap(s) hidden — flip "show likely traps" to inspect them</div>`:""}

    <section>
      <div class="head-row"><div class="label">${deals.length} listing(s)</div><div class="label" style="color:#525252">ranked best first</div></div>
      ${deals.length===0?`<div class="empty">Nothing matches these filters right now.</div>`:
        deals.map(x=>{const st=scoreStyle(x.score);return `
        <a class="deal ${x.trap?'trap':''}" href="${x.url}" target="_blank" rel="noopener">
          <div class="score" style="box-shadow:inset 0 0 0 1px ${st.c}55">
            <span class="n" style="color:${st.c}">${x.score}</span><span class="l">${st.l}</span></div>
          <div style="min-width:0;flex:1">
            <div class="title">${x.title} ${x.trap?'<span class="tag t">trap</span>':''}${x.offer?'<span class="tag">offer</span>':''}</div>
            <div class="meta">
              <span class="wht">${x.karat} · ${x.grams}g</span>
              <span>${fmt(x.price)}${x.ship?` +${fmt(x.ship)} ship`:""}</span>
              <span class="grn">↓ ${x.under_pct}% · ${fmt(x.all_in_per_g)}/g vs ${fmt(x.page_per_g)}/g</span>
              <span class="${x.profit>0?"grn":"red"}">profit ${fmt(x.profit)}</span>
              ${x.seller_pct?`<span>seller ${x.seller_pct}%</span>`:""}
            </div></div>
        </a>`;}).join("")}
    </section>

    <div class="foot">Sliders re-filter the current results instantly. Engine settings save to your repo and take effect on the next run. Saved settings and filter positions persist on this device. Stated weight and photos still need your eye before bidding.</div>`;
}

function setF(k,v){ F[k]=v; ui.F=F; saveUI(); render(); }

function gatherSettings(){
  const lines = document.getElementById("s_queries").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const ex = document.getElementById("s_exclude").value.split(",").map(s=>s.trim()).filter(Boolean);
  return {
    payout_pct:(+document.getElementById("s_payout").value||100)/100,
    trap_under_pct:(+document.getElementById("s_trap").value||50)/100,
    max_price:+document.getElementById("s_maxprice").value||2000,
    min_feedback_pct:+document.getElementById("s_seller").value||96,
    alert_min_score:+document.getElementById("s_alert").value||70,
    max_detail_calls: (SET&&SET.max_detail_calls)||35,
    extra_exclude:ex, queries:lines,
    fast_queries: (SET&&SET.fast_queries)||undefined
  };
}
function msg(t,c){ const e=document.getElementById("savemsg"); e.textContent=t; e.style.color=c||"#737373"; }
function copySettings(){
  const j=JSON.stringify(gatherSettings(),null,2);
  navigator.clipboard.writeText(j).then(()=>msg("copied — paste into settings.json in your repo, commit","#34d399"),
    ()=>msg("copy failed; select the textarea manually","#fb7185"));
}
function saveToken(){ const t=document.getElementById("s_token").value.trim();
  if(t) localStorage.setItem("gdd_token",t); else localStorage.removeItem("gdd_token");
  msg(t?"token saved on this device":"token cleared","#34d399"); }

async function saveSettings(){
  const body=JSON.stringify(gatherSettings(),null,2);
  const token=localStorage.getItem("gdd_token");
  if(!token){ copySettings(); return; }
  // derive owner/repo from the Pages URL
  const owner=location.hostname.split(".")[0];
  const repo=location.pathname.split("/").filter(Boolean)[0];
  if(!owner||!repo){ msg("couldn't detect repo; use Copy JSON","#fb7185"); return; }
  const api=`https://api.github.com/repos/${owner}/${repo}/contents/settings.json`;
  const hdr={Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"};
  msg("saving to GitHub…");
  try{
    let sha;
    const g=await fetch(api+"?ref=main",{headers:hdr});
    if(g.ok){ sha=(await g.json()).sha; }
    const put=await fetch(api,{method:"PUT",headers:hdr,body:JSON.stringify({
      message:"update settings from dashboard", content:btoa(unescape(encodeURIComponent(body))),
      sha, branch:"main"})});
    if(put.ok) msg("saved — takes effect on the next run","#34d399");
    else msg("save failed ("+put.status+"); use Copy JSON instead","#fb7185");
  }catch(e){ msg("save error; use Copy JSON instead","#fb7185"); }
}

load();
setInterval(()=>{ const e=document.getElementById("cd"); if(e) e.textContent=countdownStr(); },1000);
</script>
